<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="icono.webp" />
    <title>Juega Emparejados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            backface-visibility: hidden;
            position: absolute;
            width: 100%;
            height: 100%;
        }
        .card-back {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-emerald-700 min-h-screen flex flex-col items-center justify-center p-4 font-sans text-white relative">

    <div class="max-w-sm w-full">
        <h1 class="text-3xl font-bold text-center mb-2">🕹️ Emparejados</h1>
        <p class="text-center mb-6 text-emerald-100">Encuentra las parejas usando tu memoria</p>
        
        <div class="flex justify-between items-center mb-6 bg-emerald-800 p-4 rounded-xl border-2 border-emerald-500">
            <div>Intentos: <span id="moves" class="font-bold">0</span></div>
            <div>Parejas: <span id="score" class="font-bold">0</span>/8</div>
        </div>

        <div id="game-grid" class="grid grid-cols-4 gap-3">
            <!-- Cards will be injected here -->
        </div>

        <button onclick="resetGame()" class="w-full mt-8 bg-yellow-500 hover:bg-yellow-400 text-emerald-900 font-bold py-3 px-6 rounded-lg transition-transform active:scale-95">
            Reiniciar Juego
        </button>
    </div>

    <!-- MODAL DE VICTORIA PERSONALIZADO -->
    <div id="victory-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50 backdrop-blur-sm transition-opacity duration-300">
        <div class="bg-emerald-800 border-2 border-yellow-400 p-8 rounded-2xl max-w-xs w-full text-center shadow-2xl scale-95 transition-transform duration-300">
            <span class="text-6xl block mb-4">🏆</span>
            <h2 class="text-3xl font-bold text-yellow-400 mb-2">¡Ganaste!</h2>
            <p class="text-emerald-100 mb-6 text-lg">Encontraste todas las parejas</p>
            <button onclick="closeModalAndReset()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-emerald-900 font-bold py-3 px-6 rounded-lg transition-transform active:scale-95 shadow-md">
                Jugar otra vez
            </button>
        </div>
    </div>

    <script>
        const emojis = ['⚽', '⚽', '🏟️', '🏟️', '🥅', '🥅', '🏃‍♂️', '🏃‍♂️', '🌎', '🌎', '🕐', '🕐', '🏆', '🏆', '🗽', '🗽'];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let isLock = false;

        const gridElement = document.getElementById('game-grid');
        const movesElement = document.getElementById('moves');
        const scoreElement = document.getElementById('score');
        const modalElement = document.getElementById('victory-modal');

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            gridElement.innerHTML = '';
            const shuffled = shuffle([...emojis]);
            
            shuffled.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card aspect-square cursor-pointer';
                card.dataset.emoji = emoji;
                card.innerHTML = `
                    <div class="card-inner w-full h-full relative shadow-lg rounded-xl">
                        <div class="card-front w-full h-full bg-emerald-500 rounded-xl flex items-center justify-center border-4 border-emerald-400 text-2xl">?</div>
                        <div class="card-back w-full h-full bg-white rounded-xl flex items-center justify-center text-4xl border-4 border-emerald-200">${emoji}</div>
                    </div>
                `;
                card.addEventListener('click', flipCard);
                gridElement.appendChild(card);
            });
        }

        function flipCard() {
            if (isLock || this.classList.contains('flipped') || this.classList.contains('matched')) return;

            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                moves++;
                movesElement.textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            isLock = true;
            const [card1, card2] = flippedCards;
            
            if (card1.dataset.emoji === card2.dataset.emoji) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                scoreElement.textContent = matchedPairs;
                resetTurn();
                if (matchedPairs === 8) {
                    // Reemplazado el alert por la apertura del modal personalizado
                    setTimeout(() => {
                        modalElement.classList.remove('hidden');
                    }, 500);
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    resetTurn();
                }, 1000);
            }
        }

        function resetTurn() {
            flippedCards = [];
            isLock = false;
        }

        function resetGame() {
            matchedPairs = 0;
            moves = 0;
            movesElement.textContent = moves;
            scoreElement.textContent = matchedPairs;
            createBoard();
        }

        // Nueva función para cerrar el modal y reiniciar automáticamente
        function closeModalAndReset() {
            modalElement.classList.add('hidden');
            resetGame();
        }

        // Initialize on load
        createBoard();
    </script>
</body>
</html>
